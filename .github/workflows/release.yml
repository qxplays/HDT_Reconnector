# Optional: runs only if GitHub Actions is enabled on the repo.
# Release files are committed under releases/ — see scripts/Package-Release.ps1
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/HDT_Reconnector.zip
            releases/HDT_BgPickAdvisor.zip
            releases/meta-api.url.example
          body: |
            See [README](https://github.com/qxplays/HDT_Reconnector#install) for install steps.
            [Русская инструкция](README.ru.md)

            **Downloads (ZIP — unpack, then copy DLL to HDT Plugins folder)**

            | Archive | Plugin |
            |---------|--------|
            | `HDT_Reconnector.zip` | BG Match Helper (reconnect, run HDT as admin) |
            | `HDT_BgPickAdvisor.zip` | Hero/trinket pick overlay (meta: http://hsbg.qxplays.ru) |

            `meta-api.url.example` — optional API URL override (also inside BgPickAdvisor zip).

            > **BgReplay** is not included yet (work in progress).

            No CI build — archives are committed in `releases/` on the tag.

          generate_release_notes: true
