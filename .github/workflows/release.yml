name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/HDT_Reconnector.dll
          body: |
            See [README](https://github.com/qxplays/HDT_Reconnector#install) for install steps.
            [Русская инструкция](README.ru.md)

          generate_release_notes: true
