name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/HDT_Reconnector.dll
          body: |
            ## Установка

            1. Скачай **HDT_Reconnector.dll** ниже.
            2. Положи в `%AppData%\HearthstoneDeckTracker\Plugins\`
            3. Запусти HDT **от имени администратора**.
            4. Включи плагин **BGMatchHelper** (Options → Tracker → Plugins).
            5. Меню **Plugins** → **BG Match Helper**.

          generate_release_notes: true
